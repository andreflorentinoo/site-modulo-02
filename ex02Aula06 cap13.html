<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Degradê de cores</title>
    <style>
        /* Utilizando "*" para "(to top)" não ficar bugado */
        * {
            height: 100%;
        }
        body{
            background-image: linear-gradient(to top, #834FF0, #EC4FF0, #B74FF0, #4F50F0, #F04F96, #D39FF0);
            background-attachment: fixed; /*utilizando "background-attachment: fixed" para nao ficar uma borda quando rolar a pagina*/
        }
        
    </style>
</head>
<body>
    
</body>
</html>
